<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>手势爱心粒子</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #06060f;
      }
      canvas {
        display: block;
      }

      #panel {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 22px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        z-index: 10;
        white-space: nowrap;
      }
      .ctrl-group {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .ctrl-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0.08em;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 80px;
        height: 3px;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.12);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
      }
      #hue-slider {
        background: linear-gradient(
          to right,
          hsl(0, 85%, 65%),
          hsl(60, 85%, 65%),
          hsl(120, 85%, 65%),
          hsl(180, 85%, 65%),
          hsl(240, 85%, 65%),
          hsl(300, 85%, 65%),
          hsl(360, 85%, 65%)
        );
      }
      #color-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        flex-shrink: 0;
      }
      .divider {
        width: 1px;
        height: 20px;
        background: rgba(255, 255, 255, 0.12);
      }

      #hint {
        position: fixed;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0.15em;
        pointer-events: none;
        text-align: center;
        line-height: 1.8;
      }

      #start-cam-btn {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 18px 40px;
        background: rgba(255, 64, 128, 0.15);
        border: 1px solid rgba(255, 64, 128, 0.4);
        border-radius: 50px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 15px;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0.15em;
        cursor: pointer;
        z-index: 100;
        backdrop-filter: blur(16px);
        transition: all 0.3s;
      }
      #start-cam-btn:hover {
        background: rgba(255, 64, 128, 0.3);
        border-color: rgba(255, 64, 128, 0.7);
        color: #fff;
      }

      #status-msg {
        position: fixed;
        top: 55px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0.1em;
        pointer-events: none;
        transition: opacity 0.5s;
      }

      #hand-indicator {
        position: fixed;
        top: 20px;
        right: 24px;
        display: none;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 30px;
        z-index: 20;
        backdrop-filter: blur(12px);
      }
      #hand-icon {
        font-size: 18px;
        transition: transform 0.3s;
      }
      #hand-label {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0.08em;
        min-width: 50px;
      }
      #openness-mini {
        width: 40px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }
      #openness-mini-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff4080, #ff80b0);
        transition: width 0.12s ease-out;
      }

      #shape-selector {
        position: fixed;
        top: 20px;
        left: 24px;
        display: none;
        flex-wrap: wrap;
        gap: 6px;
        z-index: 20;
        max-width: 320px;
      }
      .shape-btn {
        padding: 6px 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        color: rgba(255, 255, 255, 0.35);
        font-size: 10px;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: all 0.3s;
      }
      .shape-btn:hover {
        border-color: rgba(255, 255, 255, 0.25);
        color: rgba(255, 255, 255, 0.6);
      }
      .shape-btn.active {
        background: rgba(255, 64, 128, 0.15);
        border-color: rgba(255, 64, 128, 0.4);
        color: rgba(255, 255, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <canvas id="text-sampler" style="display: none"></canvas>
    <video
      id="webcam"
      autoplay
      playsinline
      style="
        position: fixed;
        top: -9999px;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      "
    ></video>

    <div id="hint">
      ✋ 张开手掌 → LOVE YOU · ✊ 握拳 → 收束成心<br />拖拽旋转 · 滚轮也可交互
    </div>
    <div id="status-msg"></div>

    <button id="start-cam-btn">✋ 开启摄像头 · 手势控制</button>

    <div id="hand-indicator">
      <span id="hand-icon">✊</span>
      <span id="hand-label">握拳</span>
      <div id="openness-mini"><div id="openness-mini-fill"></div></div>
    </div>

    <div id="shape-selector">
      <button class="shape-btn active" data-open="loveyou">LOVE YOU</button>
      <button class="shape-btn" data-open="miss">MISS U</button>
      <button class="shape-btn" data-open="forever">FOREVER</button>
      <button class="shape-btn" data-open="star">✦ 星</button>
      <button class="shape-btn" data-open="ring">○ 环</button>
      <button class="shape-btn" data-open="burst">✺ 烟花</button>
      <button class="shape-btn" data-open="wave">〰 波浪</button>
    </div>

    <div id="panel">
      <div class="ctrl-group">
        <span class="ctrl-label">色相</span>
        <input type="range" id="hue-slider" min="0" max="360" value="320" />
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">饱和</span>
        <input type="range" id="sat-slider" min="20" max="100" value="90" />
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">亮度</span>
        <input type="range" id="lig-slider" min="35" max="85" value="62" />
      </div>
      <div id="color-dot"></div>
      <div class="divider"></div>
      <div class="ctrl-group">
        <span class="ctrl-label">粒子数</span>
        <input
          type="range"
          id="count-slider"
          min="500"
          max="4000"
          value="2400"
          step="100"
        />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const textCanvas = document.getElementById("text-sampler");
      const textCtx = textCanvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();

      let hue = 320,
        sat = 90,
        lig = 62;
      let particleCount = 2400;

      let rotY = 0.3,
        rotX = -0.18;
      let autoRotate = true;
      let isDragging = false;
      let lastMouseX = 0,
        lastMouseY = 0;

      let pinchCenter = { x: canvas.width / 2, y: canvas.height / 2 };
      let pinchForce = 0;
      let lastPinchDist = 0;

      let smoothOpenness = 0;
      let dispersion = 0;
      let targetDispersion = 0;
      let currentOpenShape = "loveyou";

      // ═══ 文字→坐标点采样 ═══
      function sampleTextPoints(text, fontSize, count) {
        const w = Math.min(1400, canvas.width * 0.9);
        const h = fontSize * 1.8;
        textCanvas.width = w;
        textCanvas.height = h;
        textCtx.clearRect(0, 0, w, h);
        textCtx.fillStyle = "#fff";
        textCtx.font = `900 ${fontSize}px "Georgia", "PingFang SC", "Microsoft YaHei", serif`;
        textCtx.textAlign = "center";
        textCtx.textBaseline = "middle";
        textCtx.fillText(text, w / 2, h / 2);

        const imageData = textCtx.getImageData(0, 0, w, h).data;
        const hits = [];
        const step = 2;
        for (let y = 0; y < h; y += step) {
          for (let x = 0; x < w; x += step) {
            if (imageData[(y * w + x) * 4 + 3] > 128) {
              hits.push({ x: x - w / 2, y: y - h / 2 });
            }
          }
        }
        if (hits.length === 0)
          return Array.from({ length: count }, () => ({ x: 0, y: 0 }));
        const points = [];
        for (let i = 0; i < count; i++) {
          const p = hits[Math.floor(Math.random() * hits.length)];
          points.push({
            x: p.x + (Math.random() - 0.5) * 3,
            y: p.y + (Math.random() - 0.5) * 3,
          });
        }
        return points;
      }

      // ═══ 展开形态 ═══
      function generateOpenShape(type, count) {
        const radius = Math.min(canvas.width, canvas.height) * 0.35;

        switch (type) {
          case "loveyou": {
            const fs = Math.min(150, canvas.width * 0.12);
            return sampleTextPoints("LOVE YOU", fs, count);
          }
          case "miss": {
            const fs = Math.min(170, canvas.width * 0.14);
            return sampleTextPoints("MISS U", fs, count);
          }
          case "forever": {
            const fs = Math.min(140, canvas.width * 0.11);
            return sampleTextPoints("FOREVER", fs, count);
          }
          case "star": {
            const pts = [];
            for (let i = 0; i < count; i++) {
              const angle = Math.random() * Math.PI * 2;
              const arms = 5;
              const wave = (Math.cos(angle * arms) + 1) / 2;
              const r =
                (radius * 0.3 + radius * 0.55 * wave) *
                (0.7 + Math.random() * 0.3);
              pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
            }
            return pts;
          }
          case "ring": {
            const pts = [];
            for (let i = 0; i < count; i++) {
              const angle = Math.random() * Math.PI * 2;
              const r = radius * (0.62 + Math.random() * 0.32);
              const t = (Math.random() - 0.5) * radius * 0.12;
              pts.push({
                x: Math.cos(angle) * (r + t),
                y: Math.sin(angle) * (r + t),
              });
            }
            return pts;
          }
          case "burst": {
            const pts = [];
            const rays = 14;
            for (let i = 0; i < count; i++) {
              const rayIdx = Math.floor(Math.random() * rays);
              const baseAngle = (rayIdx / rays) * Math.PI * 2;
              const angle = baseAngle + (Math.random() - 0.5) * 0.18;
              const r = Math.pow(Math.random(), 0.55) * radius * 0.9;
              pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
            }
            return pts;
          }
          case "wave": {
            const pts = [];
            for (let i = 0; i < count; i++) {
              const x = (Math.random() - 0.5) * canvas.width * 0.7;
              const waveY = Math.sin(x * 0.012) * radius * 0.35;
              const y = waveY + (Math.random() - 0.5) * 30;
              pts.push({ x, y });
            }
            return pts;
          }
          default:
            return generateOpenShape("loveyou", count);
        }
      }

      let openShapePoints = [];
      function rebuildOpenShape() {
        openShapePoints = generateOpenShape(currentOpenShape, particleCount);
        particles.forEach((p, i) => {
          if (openShapePoints[i]) {
            p.openX = openShapePoints[i].x;
            p.openY = openShapePoints[i].y;
          }
        });
      }

      // ═══ 3D爱心 ═══
      function heartSurface(t, phi, r) {
        const sinT = Math.sin(t);
        const hx = 16 * sinT * sinT * sinT;
        const hy = -(
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
        );
        // 完整360°旋转，形成闭合体积
        return {
          x: hx * Math.cos(phi) * r,
          y: hy * r,
          z: hx * Math.sin(phi) * r,
        };
      }

      // 沿心形中轴线采样内部填充点，让心脏内部也有粒子
      function heartInterior(t, r) {
        const sinT = Math.sin(t);
        const hx = 16 * sinT * sinT * sinT;
        const hy = -(
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
        );
        // 内部点：在心形轮廓内随机偏移，不需要phi旋转
        const spread = r * 0.6;
        return {
          x: hx * spread * (Math.random() - 0.5) * 2,
          y: hy * r,
          z: hx * spread * (Math.random() - 0.5) * 2,
        };
      }

      function project(x3, y3, z3, cx, cy, scale) {
        const cosX = Math.cos(rotX),
          sinX = Math.sin(rotX);
        const y1 = y3 * cosX - z3 * sinX,
          z1 = y3 * sinX + z3 * cosX;
        const cosY = Math.cos(rotY),
          sinY = Math.sin(rotY);
        const x2 = x3 * cosY + z1 * sinY,
          z2 = -x3 * sinY + z1 * cosY;
        const fov = 650,
          pz = fov + z2 * scale * 0.25;
        return {
          px: cx + (x2 * scale * fov) / pz,
          py: cy + (y1 * scale * fov) / pz,
          depth: z2,
        };
      }

      // ═══ 粒子 ═══
      class Particle {
        constructor() {
          this._sample();
          this.x =
            (Math.random() - 0.5) * canvas.width * 1.6 + canvas.width / 2;
          this.y =
            (Math.random() - 0.5) * canvas.height * 1.6 + canvas.height / 2;
          this.vx = 0;
          this.vy = 0;
          this.phase = Math.random() * Math.PI * 2;
          this.spd = 0.007 + Math.random() * 0.013;
          this.openX = 0;
          this.openY = 0;
        }
        _sample() {
          const t = Math.random() * Math.PI * 2;
          // 完整 ±π 旋转，背面也有粒子
          const phi = (Math.random() - 0.5) * Math.PI * 2;
          const rand = Math.random();

          if (rand < 0.08) {
            // 层0: 核心微光 — 极小、极柔、在心脏深处
            const r = Math.random() * 0.3;
            this.layer = 0;
            this.raw = heartInterior(t, r);
          } else if (rand < 0.22) {
            // 层1: 内部填充 — 小粒子填充体积感
            const r = 0.2 + Math.random() * 0.4;
            this.layer = 1;
            this.raw = heartSurface(t, phi, r);
          } else if (rand < 0.45) {
            // 层2: 中层 — 体积主体
            const r = 0.45 + Math.random() * 0.35;
            this.layer = 2;
            this.raw = heartSurface(t, phi, r);
          } else if (rand < 0.82) {
            // 层3: 外壳 — 定义心形轮廓，最密集
            const r = 0.78 + Math.random() * 0.22;
            this.layer = 3;
            this.raw = heartSurface(t, phi, r);
          } else {
            // 层4: 表面微光 — 极少量大亮粒子，贴在最外层
            const r = 0.92 + Math.random() * 0.08;
            this.layer = 4;
            this.raw = heartSurface(t, phi, r);
          }
        }
        computeBase(cx, cy, scale) {
          const p = project(this.raw.x, this.raw.y, this.raw.z, cx, cy, scale);
          this.heartX = p.px;
          this.heartY = p.py;
          this.depth = p.depth;
          const textTX = cx + this.openX,
            textTY = cy + this.openY;
          const d = dispersion,
            t = d * d * (3 - 2 * d); // smoothstep
          this.baseX = this.heartX * (1 - t) + textTX * t;
          this.baseY = this.heartY * (1 - t) + textTY * t;
        }
        update(cx, cy, scale) {
          this.computeBase(cx, cy, scale);
          const dx = pinchCenter.x - this.x,
            dy = pinchCenter.y - this.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 0 && pinchForce !== 0 && dist < 520) {
            const force = (520 - dist) / 520;
            const dir = pinchForce > 0 ? -1 : 1;
            const layerW = 0.6 + this.layer * 0.25;
            this.vx +=
              (dx / dist) * force * layerW * dir * Math.abs(pinchForce) * 0.1;
            this.vy +=
              (dy / dist) * force * layerW * dir * Math.abs(pinchForce) * 0.1;
          }
          const springK = 0.06 * (1 - dispersion * 0.3);
          this.vx += (this.baseX - this.x) * springK;
          this.vy += (this.baseY - this.y) * springK;
          this.vx *= 0.8;
          this.vy *= 0.8;
          this.x += this.vx;
          this.y += this.vy;
        }
        draw(tick) {
          const depthNorm = Math.max(-1, Math.min(1, this.depth / 20));
          const df = (depthNorm + 1) * 0.5; // 0=远, 1=近

          // 每层不同基础大小: 核心微小 → 表面大亮点
          const szBase = [0.35, 0.5, 0.8, 1.25, 1.8][this.layer];
          // 近处大、远处小，增强纵深
          const size = szBase * (0.45 + df * 1.0);

          // 亮度：外层亮、近处亮，内层暗（营造体积阴影）
          const layerLigOffset = [-22, -14, -6, 0, 8][this.layer];
          const depthL = lig + layerLigOffset + df * 28;
          const breath =
            Math.sin(tick * this.spd + this.phase) * (this.layer >= 3 ? 5 : 3);
          const finalL = Math.max(10, Math.min(92, depthL + breath));

          // 色相偏移：内层偏暖(+20)，外层原色，表面略偏冷(-5)
          const hShift = [22, 15, 8, 0, -5][this.layer];

          // 透明度：内层半透 → 外层实
          const baseAlpha = [0.15, 0.22, 0.32, 0.45, 0.55][this.layer];
          const alpha = baseAlpha + df * 0.4;

          const bloomSize = size * (1 + dispersion * 0.3);
          const bloomAlpha = Math.min(1, alpha + dispersion * 0.12);

          ctx.fillStyle = `hsla(${hue + hShift},${sat}%,${finalL}%,${Math.min(1, bloomAlpha)})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, Math.max(0.2, bloomSize), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      let particles = [];
      function init() {
        particles = [];
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        rebuildOpenShape();
      }
      init();

      let tick = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2,
          cy = canvas.height / 2 + 15;
        const scale = Math.min(canvas.width, canvas.height) * 0.027;

        if (autoRotate && !isDragging) {
          rotY += 0.003 * (1 - dispersion * 0.85);
        }
        // 展开时旋转角度归零让文字正面朝向
        if (dispersion > 0.5) {
          rotY *= 0.98;
          rotX *= 0.97;
        }

        dispersion += (targetDispersion - dispersion) * 0.055;

        particles.forEach((p) => p.computeBase(cx, cy, scale));
        particles.sort((a, b) => a.depth - b.depth);

        ctx.globalCompositeOperation = "lighter";
        for (const p of particles) {
          p.update(cx, cy, scale);
          p.draw(tick);
        }
        ctx.globalCompositeOperation = "source-over";

        pinchForce *= 0.91;
        tick++;
        requestAnimationFrame(animate);
      }
      animate();

      // ── UI ──
      const slHue = document.getElementById("hue-slider");
      const slSat = document.getElementById("sat-slider");
      const slLig = document.getElementById("lig-slider");
      const slCount = document.getElementById("count-slider");
      const dot = document.getElementById("color-dot");

      function updateColor() {
        hue = +slHue.value;
        sat = +slSat.value;
        lig = +slLig.value;
        dot.style.background = `hsl(${hue},${sat}%,${lig}%)`;
      }
      updateColor();
      [slHue, slSat, slLig].forEach((s) =>
        s.addEventListener("input", updateColor),
      );
      slCount.addEventListener("change", () => {
        particleCount = +slCount.value;
        init();
      });

      // ── 形态选择 ──
      const shapeBtns = document.querySelectorAll(".shape-btn");
      shapeBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          shapeBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentOpenShape = btn.dataset.open;
          rebuildOpenShape();
        });
      });

      // ── 鼠标/触控 ──
      canvas.addEventListener("mousedown", (e) => {
        isDragging = true;
        autoRotate = false;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      });
      window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        rotY += (e.clientX - lastMouseX) * 0.008;
        rotX += (e.clientY - lastMouseY) * 0.008;
        rotX = Math.max(-1.2, Math.min(1.2, rotX));
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      });
      window.addEventListener("mouseup", () => {
        isDragging = false;
        setTimeout(() => {
          autoRotate = true;
        }, 3000);
      });
      window.addEventListener("wheel", (e) => {
        pinchCenter.x = e.clientX;
        pinchCenter.y = e.clientY;
        pinchForce = e.deltaY > 0 ? -12 : 12;
      });

      let touchStartX = 0,
        touchStartY = 0;
      canvas.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length === 1) {
            isDragging = true;
            autoRotate = false;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
          }
        },
        { passive: true },
      );
      window.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          if (e.touches.length === 1 && isDragging) {
            rotY += (e.touches[0].clientX - touchStartX) * 0.008;
            rotX += (e.touches[0].clientY - touchStartY) * 0.008;
            rotX = Math.max(-1.2, Math.min(1.2, rotX));
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            const t1 = e.touches[0],
              t2 = e.touches[1];
            const dist = Math.hypot(
              t1.clientX - t2.clientX,
              t1.clientY - t2.clientY,
            );
            pinchCenter.x = (t1.clientX + t2.clientX) / 2;
            pinchCenter.y = (t1.clientY + t2.clientY) / 2;
            if (lastPinchDist > 0) pinchForce = (dist - lastPinchDist) * 0.5;
            lastPinchDist = dist;
          }
        },
        { passive: false },
      );
      window.addEventListener("touchend", (e) => {
        if (e.touches.length < 2) lastPinchDist = 0;
        if (e.touches.length === 0) {
          isDragging = false;
          setTimeout(() => {
            autoRotate = true;
          }, 3000);
        }
      });
      window.addEventListener("resize", () => {
        resize();
        pinchCenter = { x: canvas.width / 2, y: canvas.height / 2 };
        rebuildOpenShape();
      });

      // ═══ 手势识别 ═══
      const videoEl = document.getElementById("webcam");
      const startBtn = document.getElementById("start-cam-btn");
      const statusMsg = document.getElementById("status-msg");
      const handIndicator = document.getElementById("hand-indicator");
      const handIcon = document.getElementById("hand-icon");
      const handLabel = document.getElementById("hand-label");
      const opennessFill = document.getElementById("openness-mini-fill");
      const shapeSelector = document.getElementById("shape-selector");

      function showStatus(msg, duration = 3000) {
        statusMsg.textContent = msg;
        statusMsg.style.opacity = "1";
        if (duration > 0)
          setTimeout(() => {
            statusMsg.style.opacity = "0";
          }, duration);
      }

      function calcHandOpenness(lm) {
        const mcp = lm[9];
        const tips = [4, 8, 12, 16, 20],
          pips = [3, 6, 10, 14, 18];
        let score = 0;
        for (let i = 0; i < 5; i++) {
          const tip = lm[tips[i]],
            pip = lm[pips[i]];
          const td = Math.hypot(
            tip.x - mcp.x,
            tip.y - mcp.y,
            (tip.z || 0) - (mcp.z || 0),
          );
          const pd = Math.hypot(
            pip.x - mcp.x,
            pip.y - mcp.y,
            (pip.z || 0) - (mcp.z || 0),
          );
          if (td > pd * 1.1) score += 1;
          else if (td > pd * 0.85) score += 0.4;
        }
        return Math.min(1, score / 4.5);
      }

      function onHandResults(results) {
        if (
          results.multiHandLandmarks &&
          results.multiHandLandmarks.length > 0
        ) {
          const lm = results.multiHandLandmarks[0];
          const raw = calcHandOpenness(lm);
          smoothOpenness += (raw - smoothOpenness) * 0.18;
          targetDispersion = smoothOpenness;

          opennessFill.style.width = smoothOpenness * 100 + "%";
          if (smoothOpenness > 0.6) {
            handIcon.textContent = "✋";
            handIcon.style.transform = "scale(1.1)";
            handLabel.textContent = "展开";
          } else if (smoothOpenness > 0.3) {
            handIcon.textContent = "🤚";
            handIcon.style.transform = "scale(1)";
            handLabel.textContent = "半开";
          } else {
            handIcon.textContent = "✊";
            handIcon.style.transform = "scale(0.9)";
            handLabel.textContent = "握拳";
          }
        } else {
          targetDispersion *= 0.95;
          if (targetDispersion < 0.01) targetDispersion = 0;
          opennessFill.style.width = "0%";
          handIcon.textContent = "👀";
          handLabel.textContent = "未检测";
        }
      }

      async function startHandTracking() {
        startBtn.style.display = "none";
        showStatus("正在加载手势识别模型…", 0);

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 320, height: 240, facingMode: "user" },
          });
          videoEl.srcObject = stream;

          const hands = new Hands({
            locateFile: (file) =>
              `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`,
          });
          hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5,
          });
          hands.onResults(onHandResults);

          const camera = new Camera(videoEl, {
            onFrame: async () => {
              await hands.send({ image: videoEl });
            },
            width: 320,
            height: 240,
          });
          await camera.start();

          handIndicator.style.display = "flex";
          shapeSelector.style.display = "flex";
          showStatus("✋ 张开手掌展开文字 · 握拳收回心形", 4000);
        } catch (err) {
          console.error("启动失败:", err);
          showStatus("摄像头启动失败，请检查权限后重试", 5000);
          startBtn.style.display = "block";
          startBtn.textContent = "🔄 重试开启摄像头";
        }
      }

      startBtn.addEventListener("click", startHandTracking);
    </script>
  </body>
</html>
